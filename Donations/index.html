<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dons — ArchiveFever.Work</title>
  <link rel="icon" href="../IMG/Jerome.webp" type="image/webp" />
  <link href="https://fonts.googleapis.com/css2?family=Source+Code+Pro:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #161616;
      --surface2: #1e1e1e;
      --border: #2a2a2a;
      --border-soft: #222;
      --accent: #ff8c00;
      --txt: #f5f5f7;
      --txt2: #a1a1a6;
      --txt3: #6e6e73;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      min-height: 100dvh;
      background: var(--bg);
      color: var(--txt);
      font-family: "Source Code Pro", ui-monospace, monospace;
      -webkit-font-smoothing: antialiased;
    }

    .page {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    .card-wrap {
      width: min(520px, 100%);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      overflow: hidden;
      box-shadow:
        0 0 0 1px rgba(255,255,255,.03) inset,
        0 32px 80px -20px rgba(0,0,0,.85),
        0 8px 24px -8px rgba(0,0,0,.6);
      animation: rise .55s cubic-bezier(.16,1,.3,1) both;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(16px) scale(.99); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border-soft);
      background: var(--surface2);
    }

    .site-name {
      font-weight: 700;
      font-size: 13px;
      letter-spacing: .5px;
      text-transform: uppercase;
      color: var(--txt);
    }

    .site-name span { color: var(--accent); }

    .card-controls { display: flex; gap: 8px; align-items: center; }

    .lang {
      display: inline-flex;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      background: var(--bg);
    }
    .lang button {
      appearance: none; border: 0;
      border-right: 1px solid var(--border);
      background: transparent; color: var(--txt3);
      padding: 7px 12px; font: inherit; font-size: 11px;
      letter-spacing: .5px; text-transform: uppercase;
      cursor: pointer; transition: color .15s; outline: none; font-weight: 700;
    }
    .lang button:last-child { border-right: 0; }
    .lang button:hover { color: var(--txt); }
    .lang button[aria-pressed="true"] { color: #000; background: var(--accent); }

    .chip {
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--txt3);
      padding: 7px 12px;
      border-radius: 8px;
      font: inherit;
      font-weight: 700; font-size: 11px;
      text-transform: uppercase; letter-spacing: .5px;
      text-decoration: none;
      display: inline-flex; align-items: center;
      justify-content: center; white-space: nowrap;
      transition: color .15s, border-color .15s;
    }
    .chip:hover { color: var(--txt); border-color: #3a3a3a; }

    .card-body { padding: 24px 20px; display: flex; flex-direction: column; gap: 24px; }

    .text-block { display: flex; flex-direction: column; gap: 8px; text-align: center; }

    .section-title {
      font-size: 11px;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 700;
    }

    .section-msg {
      font-size: 13px;
      color: var(--txt2);
      line-height: 1.7;
    }

    .don-list { display: flex; flex-direction: column; gap: 8px; }

    .don-link {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      text-decoration: none;
      color: var(--txt);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .5px;
      text-transform: uppercase;
      transition: border-color .15s, color .15s;
    }
    .don-link:hover { border-color: var(--accent); color: var(--accent); }

    .don-arrow { opacity: .5; }

    @media (max-width: 400px) {
      .card-top { flex-wrap: wrap; }
      .card-body { padding: 20px 16px; }
    }

    @media (prefers-reduced-motion: reduce) {
      .card-wrap { animation: none; }
    }
  </style>
</head>
<body>

<div class="page">
  <div class="card-wrap">

    <div class="card-top">
      <div class="site-name">Archive<span>Fever</span>.Work</div>
      <div class="card-controls">
        <div class="lang" role="group" aria-label="Language">
          <button id="btnFR" type="button" aria-pressed="true">FR</button>
          <button id="btnEN" type="button" aria-pressed="false">EN</button>
        </div>
        <a class="chip" href="../index.html"><span id="backLabel">Retour</span></a>
      </div>
    </div>

    <div class="card-body">

      <div class="text-block">
        <div class="section-title" id="pageTitle">Dons</div>
        <div class="section-msg" id="pageMsg">Si tu apprécies ce que je fais et que tu veux soutenir le projet, c'est par ici. Aucune obligation, évidemment.</div>
      </div>

      <div class="don-list">
        <a class="don-link" href="https://www.paypal.com/paypalme/Fever65" target="_blank" rel="noopener">
          <span>PayPal</span>
          <span class="don-arrow">→</span>
        </a>
        <a class="don-link" href="https://ko-fi.com/archivefeverwork" target="_blank" rel="noopener">
          <span>Ko-fi</span>
          <span class="don-arrow">→</span>
        </a>
      </div>

    </div>
  </div>
</div>

<script>
  const $ = id => document.getElementById(id);

  const T = {
    fr: {
      pageTitle:  "Dons",
      pageMsg:    "Si tu apprécies ce que je fais et que tu veux soutenir le projet, c'est par ici. Aucune obligation, évidemment.",
      backLabel:  "Retour",
    },
    en: {
      pageTitle:  "Donations",
      pageMsg:    "If you enjoy what I do and want to support the project, here's where to go. No pressure, obviously.",
      backLabel:  "Back",
    }
  };

  let currentLang = "fr";

  function setLang(lang) {
    currentLang = lang;
    const t = T[lang];
    document.documentElement.lang = lang;
    $("pageTitle").textContent  = t.pageTitle;
    $("pageMsg").textContent    = t.pageMsg;
    $("backLabel").textContent  = t.backLabel;
    $("btnFR").setAttribute("aria-pressed", String(lang === "fr"));
    $("btnEN").setAttribute("aria-pressed", String(lang === "en"));
    try { localStorage.setItem("af_lang", lang); } catch(e) {}
  }

  $("btnFR").onclick = () => setLang("fr");
  $("btnEN").onclick = () => setLang("en");

  let savedLang = "fr";
  try { savedLang = localStorage.getItem("af_lang") || "fr"; } catch(e) {}
  setLang(savedLang);
</script>
</body>
</html>
