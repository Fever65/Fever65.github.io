<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ArchiveFever.Work</title>
  <link rel="icon" href="IMG/Jerome.webp" type="image/webp" />
  <link href="https://fonts.googleapis.com/css2?family=Source+Code+Pro:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: #0a0a0a;
      color: #a1a1a6;
      font-family: "Source Code Pro", ui-monospace, monospace;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    .page {
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 28px;
    }

    .label {
      font-size: 11px;
      letter-spacing: .25em;
      text-transform: uppercase;
      color: #3a3a3a;
    }

    .go-btn {
      appearance: none;
      border: 1px solid #2a2a2a;
      background: #161616;
      color: #f5f5f7;
      padding: 14px 40px;
      border-radius: 10px;
      font-family: inherit;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .2em;
      text-transform: uppercase;
      cursor: pointer;
      transition: border-color .15s, color .15s;
    }
    .go-btn:hover { border-color: #ff8c00; color: #ff8c00; }

    .loading-bar-wrap {
      display: none;
      width: min(260px, 70vw);
      flex-direction: column;
      gap: 10px;
      align-items: center;
    }

    .loading-txt {
      font-size: 11px;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: #3a3a3a;
    }

    .loading-bar-bg {
      width: 100%;
      height: 2px;
      background: #1e1e1e;
      border-radius: 2px;
      overflow: hidden;
    }

    .loading-bar-fill {
      height: 100%;
      width: 0%;
      background: #ff8c00;
      border-radius: 2px;
      transition: width .1s linear;
    }

    .chaos {
      display: none;
      position: fixed;
      inset: 0;
      background: #0a0a0a;
      z-index: 10;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .jerome-main {
      width: min(260px, 65vw);
      border-radius: 50%;
      position: relative;
      z-index: 20;
      animation: popMain .35s cubic-bezier(.16,1,.3,1) both;
    }

    .jerome-label {
      position: absolute;
      bottom: 12%;
      left: 0; right: 0;
      text-align: center;
      font-size: clamp(2rem, 10vw, 4rem);
      font-weight: 700;
      letter-spacing: .1em;
      color: #ff8c00;
      text-transform: uppercase;
      z-index: 25;
      animation: popMain .4s .1s cubic-bezier(.16,1,.3,1) both;
      text-shadow: 0 0 40px rgba(255,140,0,.6);
    }

    @keyframes popMain {
      from { transform: scale(0); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }

    .jerome-mini {
      position: fixed;
      border-radius: 50%;
      object-fit: cover;
      z-index: 15;
    }

    @keyframes float1 {
      0%,100% { transform: translate(0,0) rotate(0deg); }
      25%     { transform: translate(12px,-14px) rotate(6deg); }
      50%     { transform: translate(-8px,10px) rotate(-4deg); }
      75%     { transform: translate(10px,6px) rotate(5deg); }
    }
    @keyframes float2 {
      0%,100% { transform: translate(0,0) rotate(0deg); }
      25%     { transform: translate(-14px,10px) rotate(-7deg); }
      50%     { transform: translate(10px,-12px) rotate(5deg); }
      75%     { transform: translate(-6px,8px) rotate(-3deg); }
    }
    @keyframes float3 {
      0%,100% { transform: translate(0,0) rotate(0deg); }
      33%     { transform: translate(8px,14px) rotate(4deg); }
      66%     { transform: translate(-12px,-8px) rotate(-6deg); }
    }
  </style>
</head>
<body>

<div class="page" id="mainPage">
  <div class="label">Thank you for scanning this QR code.</div>
  <button class="go-btn" id="goBtn">GO</button>
  <div class="loading-bar-wrap" id="loadingWrap">
    <div class="loading-txt" id="loadingTxt">Initializing…</div>
    <div class="loading-bar-bg">
      <div class="loading-bar-fill" id="barFill"></div>
    </div>
  </div>
</div>

<div class="chaos" id="chaos">
  <img src="IMG/Jerome.webp" class="jerome-main" alt="" />
  <div class="jerome-label">GET JEROMED!</div>
</div>

<script>
  const floatAnims = ["float1", "float2", "float3"];
  const positions = [
    { top:  "4%",  left: "4%",  size: 80 },
    { top:  "3%",  left: "72%", size: 70 },
    { top:  "18%", left: "84%", size: 90 },
    { top:  "68%", left: "1%",  size: 75 },
    { top:  "74%", left: "72%", size: 85 },
    { top:  "84%", left: "34%", size: 65 },
    { top:  "38%", left: "87%", size: 72 },
    { top:  "48%", left: "0%",  size: 80 },
    { top:  "8%",  left: "40%", size: 58 },
    { top:  "86%", left: "8%",  size: 75 },
    { top:  "58%", left: "54%", size: 55 },
    { top:  "28%", left: "8%",  size: 65 },
  ];

  const steps = [
    { pct: 15,  txt: "Initializing…",            delay: 100  },
    { pct: 35,  txt: "Connecting to server…",     delay: 350  },
    { pct: 55,  txt: "Loading modules…",          delay: 650  },
    { pct: 75,  txt: "Verifying files…",          delay: 950  },
    { pct: 90,  txt: "Finalizing…",               delay: 1250 },
    { pct: 100, txt: "Ready.",                    delay: 1550 },
  ];

  document.getElementById("goBtn").addEventListener("click", () => {
    const btn = document.getElementById("goBtn");
    btn.disabled = true;
    btn.style.opacity = ".3";
    btn.style.cursor = "default";

    const wrap = document.getElementById("loadingWrap");
    const fill = document.getElementById("barFill");
    const txt  = document.getElementById("loadingTxt");
    wrap.style.display = "flex";

    steps.forEach(({ pct, txt: t, delay }) => {
      setTimeout(() => {
        fill.style.width = pct + "%";
        txt.textContent  = t;
      }, delay);
    });

    setTimeout(() => {
      const audio = new Audio("SOUND/o-o.mp3");
      audio.volume = 1;
      audio.loop = true;
      audio.play().catch(() => {});

      const chaos = document.getElementById("chaos");
      chaos.style.display = "flex";
      chaos.style.cursor = "pointer";
      chaos.addEventListener("click", () => {
        window.location.href = "https://www.paypal.com/paypalme/Fever65";
      });

      positions.forEach(({ top, left, size }, i) => {
        setTimeout(() => {
          const img = document.createElement("img");
          img.src = "IMG/Jerome.webp";
          img.className = "jerome-mini";
          img.alt = "";
          const anim = floatAnims[i % floatAnims.length];
          const dur  = (3 + Math.random() * 3).toFixed(1) + "s";
          const del  = (Math.random()).toFixed(2) + "s";
          img.style.cssText = `
            top: ${top};
            left: ${left};
            width: ${size}px;
            height: ${size}px;
            animation: ${anim} ${dur} ${del} ease-in-out infinite;
          `;
          chaos.appendChild(img);
        }, i * 100);
      });
    }, 2000);
  });
</script>
</body>
</html>
